<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // String exercises
    let string = "The Revolution will not be televised";
    const badstring = string.replace("not ", "");
    console.log(badstring); // "The Revolution will be televised"
    console.log(string)
    console.log(string.length); // 13
    console.log(string.toUpperCase()); // "HELLO, WORLD!"
    console.log(string.toLowerCase()); // "hello, world!"
    console.log(string.substring(0, 5)); // "Hello"
    console.log(string.split(", ")); // ["Hello", "World!"]
  </script>
</body>
</html>
