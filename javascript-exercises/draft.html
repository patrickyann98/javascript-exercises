<script>
  let input = document.getElementById("Input");
  let result = document.getElementById("result");

  input.addEventListener("input", function () {
    let n = Number(input.value);
    let output = "";

    for (let i = 2; i <= n; i++) {
      let isPrime = true;

      for (let j = 2; j < i; j++) {
        if (i % j === 0) {
          isPrime = false;
          break;
        }
      }

      if (isPrime) {
        output += i + " ";
      }
    }

    result.textContent = output;
